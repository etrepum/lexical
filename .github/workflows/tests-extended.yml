name: Lexical Tests (Extended)

on:
  pull_request:
    types: [labeled, synchronize, reopened]
    paths-ignore:
      - 'packages/lexical-website/**'
      - 'packages/*/README.md'
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: read
  actions: read

concurrency:
  # Only cancel an in-progress run when a newer commit lands on the same ref.
  # Other events (labeled, reopened, review submitted) get a distinct group so
  # they never cancel a run that is already underway.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' && 'synchronize' || github.run_id }}
  cancel-in-progress: true

jobs:
  check_should_run:
    if: github.repository_owner == 'facebook'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_STATE: ${{ github.event.review.state }}
          HAS_EXTENDED_TESTS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'extended-tests') }}
          HAS_DEPENDENCIES_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'dependencies') }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          WORKFLOW_FILE: tests-extended.yml
        run: |
          set -euo pipefail

          gate_open=false
          # A gating label opens the gate on any trigger.
          if [ "$HAS_EXTENDED_TESTS_LABEL" = "true" ] || [ "$HAS_DEPENDENCIES_LABEL" = "true" ]; then
            gate_open=true
          elif [ "$EVENT_NAME" = "pull_request_review" ]; then
            # An approval review opens the gate.
            if [ "$REVIEW_STATE" = "approved" ]; then
              gate_open=true
            fi
          else
            # For pull_request synchronize/reopened with no gating label, run
            # if the PR is currently approved so new commits to an approved
            # PR still get tested.
            DECISION=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json reviewDecision --jq .reviewDecision)
            if [ "$DECISION" = "APPROVED" ]; then
              gate_open=true
            fi
          fi

          if [ "$gate_open" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Dedup: skip if another run of this workflow is already in progress
          # or has completed successfully on the same commit. A previous failed
          # run does not block a fresh attempt.
          OTHER_RUNS=$(gh api \
            "repos/$REPO/actions/workflows/$WORKFLOW_FILE/runs?head_sha=$HEAD_SHA&per_page=100" \
            --jq "[.workflow_runs[]
                   | select(.id != $CURRENT_RUN_ID)
                   | select(.status == \"in_progress\"
                            or .status == \"queued\"
                            or .conclusion == \"success\")]
                  | length")
          if [ "$OTHER_RUNS" -gt 0 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

  e2e-tests:
    needs: check_should_run
    if: needs.check_should_run.outputs.should_run == 'true'
    uses: ./.github/workflows/call-e2e-all-tests.yml

  integration-tests:
    needs: check_should_run
    if: needs.check_should_run.outputs.should_run == 'true'
    uses: ./.github/workflows/call-integration-tests.yml
