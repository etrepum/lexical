name: Lexical Tests (Extended)

on:
  pull_request:
    types: [labeled, synchronize, reopened]
    paths-ignore:
      - 'packages/lexical-website/**'
      - 'packages/*/README.md'
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: read
  actions: read

concurrency:
  # Only cancel an in-progress run when a newer commit lands on the same ref.
  # Other events (labeled, reopened, review submitted) get a distinct group so
  # they never cancel a run that is already underway.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' && 'synchronize' || github.run_id }}
  cancel-in-progress: true

jobs:
  check_should_run:
    if: github.repository_owner == 'facebook'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map((l) => l.name);
            const hasGatingLabel =
              labels.includes('extended-tests') || labels.includes('dependencies');

            let gateOpen = false;
            if (hasGatingLabel) {
              gateOpen = true;
            } else if (context.eventName === 'pull_request_review') {
              gateOpen = context.payload.review?.state === 'approved';
            } else {
              // pull_request synchronize/reopened with no gating label: run if
              // the PR is currently approved so new commits to an approved PR
              // still get tested. reviewDecision is GraphQL-only.
              const { repository } = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                   repository(owner: $owner, name: $repo) {
                     pullRequest(number: $number) { reviewDecision }
                   }
                 }`,
                { owner: context.repo.owner, repo: context.repo.repo, number: pr.number },
              );
              gateOpen = repository.pullRequest.reviewDecision === 'APPROVED';
            }

            if (!gateOpen) {
              core.setOutput('should_run', 'false');
              return;
            }

            // Dedup: skip if another run of this workflow is already in
            // progress, queued, or has succeeded on the same head SHA. A
            // previous failed run does not block a fresh attempt.
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'tests-extended.yml',
              head_sha: pr.head.sha,
              per_page: 100,
            });
            const blocking = data.workflow_runs.filter(
              (r) =>
                r.id !== context.runId &&
                (r.status === 'in_progress' ||
                  r.status === 'queued' ||
                  r.conclusion === 'success'),
            );
            core.setOutput('should_run', blocking.length === 0 ? 'true' : 'false');

  e2e-tests:
    needs: check_should_run
    if: needs.check_should_run.outputs.should_run == 'true'
    uses: ./.github/workflows/call-e2e-all-tests.yml

  integration-tests:
    needs: check_should_run
    if: needs.check_should_run.outputs.should_run == 'true'
    uses: ./.github/workflows/call-integration-tests.yml
