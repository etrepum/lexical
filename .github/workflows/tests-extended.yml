name: Lexical Tests (Extended)

on:
  pull_request:
    types: [labeled, synchronize, reopened]
    paths-ignore:
      - 'packages/lexical-website/**'
      - 'packages/*/README.md'
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: read
  actions: read

concurrency:
  # Only cancel an in-progress run when a newer commit lands on the same ref.
  # Other events (labeled, reopened, review submitted) get a distinct group so
  # they never cancel a run that is already underway.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' && 'synchronize' || github.run_id }}
  cancel-in-progress: true

jobs:
  check_should_run:
    if: github.repository_owner == 'facebook'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map((l) => l.name);
            const hasGatingLabel =
              labels.includes('extended-tests') || labels.includes('dependencies');

            let gateOpen = false;
            if (hasGatingLabel) {
              gateOpen = true;
            } else if (context.eventName === 'pull_request_review') {
              gateOpen = context.payload.review?.state === 'approved';
            } else {
              // pull_request synchronize/reopened with no gating label: run if
              // the PR is currently approved so new commits to an approved PR
              // still get tested. reviewDecision is GraphQL-only.
              const { repository } = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                   repository(owner: $owner, name: $repo) {
                     pullRequest(number: $number) { reviewDecision }
                   }
                 }`,
                { owner: context.repo.owner, repo: context.repo.repo, number: pr.number },
              );
              gateOpen = repository.pullRequest.reviewDecision === 'APPROVED';
            }

            if (!gateOpen) {
              core.setOutput('should_run', 'false');
              return;
            }

            // Dedup: skip if another run of this workflow has already executed
            // the extended test jobs successfully on the same head SHA, or has
            // them currently queued/in progress. A previous run that only
            // executed check_should_run (gate closed) doesn't count — its
            // conclusion is success even though no tests actually ran.
            const { data: runsData } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'tests-extended.yml',
              head_sha: pr.head.sha,
              per_page: 100,
            });
            let blocking = false;
            for (const run of runsData.workflow_runs) {
              if (run.id === context.runId) continue;
              const completedOk =
                run.status === 'completed' && run.conclusion === 'success';
              const active =
                run.status === 'in_progress' || run.status === 'queued';
              if (!completedOk && !active) continue;
              const { data: jobsData } =
                await github.rest.actions.listJobsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                  per_page: 100,
                });
              const ranTests = jobsData.jobs.some(
                (j) =>
                  j.name !== 'check_should_run' &&
                  (j.conclusion === 'success' ||
                    j.status === 'in_progress' ||
                    j.status === 'queued'),
              );
              if (ranTests) {
                blocking = true;
                break;
              }
            }
            core.setOutput('should_run', blocking ? 'false' : 'true');

  e2e-tests:
    needs: check_should_run
    if: needs.check_should_run.outputs.should_run == 'true'
    uses: ./.github/workflows/call-e2e-all-tests.yml

  integration-tests:
    needs: check_should_run
    if: needs.check_should_run.outputs.should_run == 'true'
    uses: ./.github/workflows/call-integration-tests.yml
