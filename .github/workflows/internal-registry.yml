name: Internal Registry

# Verifies every pinned dependency is available from the registry before it can
# break a build. Mark the merge_group run ("Internal Registry / dependency-check")
# as a REQUIRED status check to gate landing; fork PRs are skipped and enforced
# by that required merge_group run.

on:
  pull_request:
  merge_group:

permissions: {}

jobs:
  dependency-check:
    # Only the canonical repo can authenticate to the internal registry. Forks
    # (including a fork's own PRs, which do get an OIDC token but one the
    # registry rejects with 401) skip the job entirely. Cross-fork PRs to the
    # canonical repo still run here but lack OIDC, and are handled by the
    # in-action skip that defers to the required merge_group run.
    if: github.repository == 'facebook/lexical'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/internal-registry/dependency-check
